<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZenBoard Small Promo Tile</title>
  <style>
    :root {
      --bg-top: #f8fbff;
      --bg-mid: #dbeafe;
      --bg-bottom: #f6c8ea;
      --glow: rgba(255, 255, 255, 0.64);
      --text: #f8fbff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      background:
        radial-gradient(circle at 52% 46%, var(--glow), transparent 34%),
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.82), transparent 28%),
        linear-gradient(145deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .tile {
      position: relative;
      display: grid;
      width: 100vw;
      height: 100vh;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 46%, var(--glow), transparent 34%),
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.82), transparent 28%),
        linear-gradient(145deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    .tile::before {
      position: absolute;
      inset: 0;
      content: "";
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), transparent 38%),
        radial-gradient(circle at 18% 24%, rgba(62, 76, 122, 0.22) 0 1.25px, transparent 2px),
        radial-gradient(circle at 74% 20%, rgba(62, 76, 122, 0.2) 0 1.2px, transparent 2px),
        radial-gradient(circle at 84% 62%, rgba(62, 76, 122, 0.18) 0 1px, transparent 2px);
      opacity: 0.9;
    }

    .logo-wrap {
      position: relative;
      display: grid;
      width: 44%;
      aspect-ratio: 1;
      place-items: center;
      border-radius: 30%;
      background: rgba(255, 255, 255, 0.54);
      box-shadow:
        0 26px 64px rgba(42, 31, 93, 0.24),
        0 0 0 1px rgba(255, 255, 255, 0.8),
        0 0 36px rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(2px);
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="tile" aria-label="ZenBoard small promotional tile">
    <div class="logo-wrap">
      <img src="../../public/brand/logo.png" alt="ZenBoard logo">
    </div>
  </main>
</body>
</html>
