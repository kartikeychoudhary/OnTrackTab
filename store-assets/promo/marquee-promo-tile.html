<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZenBoard Marquee Promo Tile</title>
  <style>
    :root {
      --bg-top: #061448;
      --bg-mid: #31206e;
      --bg-bottom: #ec75ba;
      --text: #f9fbff;
      --muted: rgba(249, 251, 255, 0.76);
      --glow: rgba(236, 129, 205, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      background: #101426;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .tile {
      position: relative;
      display: grid;
      width: min(100vw, 1400px);
      aspect-ratio: 5 / 2;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: clamp(28px, 6vw, 96px);
      overflow: hidden;
      padding: clamp(34px, 6vw, 92px) clamp(38px, 7vw, 120px);
      background:
        radial-gradient(circle at 74% 50%, var(--glow), transparent 28%),
        radial-gradient(circle at 16% 12%, rgba(116, 142, 255, 0.34), transparent 24%),
        linear-gradient(135deg, var(--bg-top) 0%, var(--bg-mid) 56%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    .tile::before {
      position: absolute;
      inset: 0;
      content: "";
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.8) 0 1.5px, transparent 2px),
        radial-gradient(circle at 47% 18%, rgba(255, 255, 255, 0.62) 0 1.35px, transparent 2px),
        radial-gradient(circle at 64% 72%, rgba(255, 255, 255, 0.7) 0 1.4px, transparent 2px),
        radial-gradient(circle at 90% 28%, rgba(255, 255, 255, 0.76) 0 1.5px, transparent 2px);
      opacity: 0.9;
    }

    .copy,
    .logo {
      position: relative;
      z-index: 1;
    }

    .copy {
      max-width: 780px;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(56px, 8vw, 140px);
      font-weight: 800;
      letter-spacing: 0;
      line-height: 0.92;
    }

    p {
      max-width: 680px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(20px, 2.2vw, 34px);
      font-weight: 500;
      line-height: 1.2;
    }

    .logo {
      width: clamp(190px, 24vw, 400px);
      aspect-ratio: 1;
      border-radius: 30%;
      box-shadow: 0 34px 90px rgba(1, 8, 39, 0.46);
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="tile" aria-label="ZenBoard marquee promotional tile">
    <section class="copy">
      <h1>ZenBoard</h1>
      <p>A calmer new tab dashboard for search, notes, weather, and focus.</p>
    </section>
    <div class="logo">
      <img src="../../public/brand/logo.png" alt="ZenBoard logo">
    </div>
  </main>
</body>
</html>
